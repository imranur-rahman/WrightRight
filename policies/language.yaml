- id: lang-passive-voice
  category: language
  name: "Avoid Passive Voice"
  description: "Prefer active voice over passive voice in academic writing."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "EN_A_VS_AN"
      - "PASSIVE_VOICE"
    fallback_regex:
      pattern: "\\b(?:is|are|was|were|be|been|being)\\s+\\w+ed\\b"
      flags: "gi"
    message: "Possible passive voice detected. Consider rewriting in active voice."

- id: lang-hedge-words
  category: language
  name: "Avoid Hedge Words"
  description: "Avoid vague hedge words that weaken academic arguments."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "WEAK_WORDS"
    fallback_regex:
      pattern: "\\b(?:seems?|appears?|might|perhaps|probably|possibly|somewhat|fairly|rather|quite|relatively|generally|usually|typically|often|sometimes|certain(?:ly)?|clearly|obviously|basically|essentially|virtually|nearly|almost|mostly|largely)\\b"
      flags: "gi"
    message: "Hedge word detected. Consider using more precise language."

- id: lang-sentence-length
  category: language
  name: "Sentence Length"
  description: "Sentences should not exceed 40 words for clarity."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "TOO_LONG_SENTENCE"
    fallback_regex:
      pattern: null
      flags: "gi"
    word_limit: 40
    message: "Sentence exceeds 40 words. Consider splitting it."

- id: lang-first-person-singular
  category: language
  name: "Avoid First-Person Singular"
  description: "Prefer 'we' over 'I' in academic papers with multiple authors."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "I_LOWERCASE"
    fallback_regex:
      pattern: "\\b(?:I|me|my|mine|myself)\\b"
      flags: "g"
    message: "First-person singular detected. Consider using 'we' for academic writing."

- id: lang-weak-sentence-opener
  category: language
  name: "Avoid Weak Sentence Openers"
  description: "Do not start sentences with 'This is', 'It is', or 'There are'."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "WEAK_IT_IS"
      - "IT_IS"
    fallback_regex:
      pattern: "(?:^|(?<=[.!?]\\s{1,3}))(This is|It is|It was|It has|There are|There is|There were|There was)\\b"
      flags: "gi"
    message: "Weak sentence opener detected. Rewrite to lead with the subject or action."

- id: lang-sentence-starts-with-number
  category: language
  name: "Sentence Starts with Number"
  description: "Do not begin a sentence with a numeral; spell it out or rewrite."
  severity: warning
  enabled: true
  scope: extension
  check:
    type: languagetool
    languagetool_rule_ids:
      - "SENT_START_NUM"
    fallback_regex:
      pattern: "(?:^|(?<=[.!?]\\s{1,3}))\\d"
      flags: "gm"
    message: "Sentence starts with a numeral. Spell out the number or restructure the sentence."
